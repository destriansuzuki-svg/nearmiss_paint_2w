<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Painting 2W</title>
    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.replace('index.html');
        } else if (localStorage.getItem('role') !== 'admin') {
            alert("Akses Ditolak! Anda bukan Admin.");
            window.location.replace('datanearmiss.html');
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        [x-cloak] { display: none !important; } 
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .sidebar-active { background: linear-gradient(90deg, #2563eb, #3b82f6); color: white !important; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body x-data="appData()" x-init="initApp()" class="antialiased text-slate-900">

    <div class="flex h-screen overflow-hidden">
        <aside :class="sidebarOpen ? 'translate-x-0 w-64' : '-translate-x-full lg:translate-x-0 lg:w-20'"
            class="fixed lg:relative inset-y-0 left-0 bg-[#0f172a] text-white transition-all duration-300 flex flex-col z-[60] shadow-2xl lg:shadow-none">
            
            <div class="p-5 flex items-center justify-between">
                <h1 x-show="sidebarOpen || window.innerWidth < 1024" class="font-black text-lg italic tracking-tighter">
                    <span class="text-blue-500">PAINTING</span><span class="text-white">2W</span>
                </h1>
                <button @click="sidebarOpen = !sidebarOpen" class="text-slate-400 hover:text-white transition-colors">
                    <i data-lucide="menu" class="w-5 h-5"></i>
                </button>
            </div>

            <nav class="flex-1 px-3 space-y-2 mt-4">
                <a href="#" class="flex items-center px-4 py-3 rounded-xl sidebar-active font-bold">
                    <i data-lucide="layout-grid" class="w-5 h-5"></i>
                    <span x-show="sidebarOpen" class="ml-3 text-[11px] tracking-widest uppercase">Dashboard</span>
                </a>
                <a href="datanearmiss.html" class="flex items-center px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 transition-all font-bold">
                    <i data-lucide="alert-triangle" class="w-5 h-5"></i>
                    <span x-show="sidebarOpen" class="ml-3 text-[11px] tracking-widest uppercase">Nearmiss</span>
                </a>
                <a href="datakaryawan.html" class="flex items-center px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 transition-all font-bold">
                    <i data-lucide="users" class="w-5 h-5"></i>
                    <span x-show="sidebarOpen" class="ml-3 text-[11px] tracking-widest uppercase">Karyawan</span>
                </a>
            </nav>

            <div class="p-5 border-t border-slate-800/50">
                <button @click="logout()" class="flex items-center text-red-400 font-bold hover:text-red-300">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                    <span x-show="sidebarOpen" class="ml-3 text-[10px] uppercase tracking-widest">Keluar</span>
                </button>
            </div>
        </aside>

        <div x-show="sidebarOpen" @click="sidebarOpen = false" class="fixed inset-0 bg-black/50 z-[50] lg:hidden" x-cloak></div>

        <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
            <header class="bg-white px-4 lg:px-8 py-4 flex flex-col md:flex-row md:items-center justify-between border-b border-slate-100 gap-4">
                <div class="flex items-center gap-3">
                    <button @click="sidebarOpen = true" class="lg:hidden text-slate-600"><i data-lucide="menu"></i></button>
                    <h2 class="text-lg font-extrabold text-[#1e293b] uppercase tracking-tight">Dashboard</h2>
                </div>
                
                <div class="flex flex-wrap items-center gap-2">
                    <div class="flex items-center gap-2 bg-slate-50 px-3 py-1.5 rounded-lg border border-slate-200">
                        <input type="date" x-model="startDate" @change="updateDashboard()" class="bg-transparent text-[10px] font-bold outline-none">
                        <span class="text-slate-300 text-[10px]">to</span>
                        <input type="date" x-model="endDate" @change="updateDashboard()" class="bg-transparent text-[10px] font-bold outline-none">
                    </div>

                    <button @click="loadData()" class="bg-blue-50 p-2 rounded-lg text-blue-600 hover:bg-blue-100 transition-colors">
                        <i data-lucide="refresh-cw" class="w-4 h-4" :class="isSyncing ? 'animate-spin' : ''"></i>
                    </button>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-4 lg:p-6 space-y-6">
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 lg:gap-4">
                    <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm text-center lg:text-left">
                        <p class="text-[10px] font-bold text-blue-500 uppercase">Total Temuan</p>
                        <h4 class="text-2xl font-black text-slate-800" x-text="filteredNearmiss.length">0</h4>
                    </div>
                    <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm text-center lg:text-left">
                        <p class="text-[10px] font-bold text-red-500 uppercase">Open Status</p>
                        <h4 class="text-2xl font-black text-slate-800" x-text="countPending()">0</h4>
                    </div>
                    <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm text-center lg:text-left">
                        <p class="text-[10px] font-bold text-green-500 uppercase">Closed Status</p>
                        <h4 class="text-2xl font-black text-slate-800" x-text="countClosed()">0</h4>
                    </div>
                    <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm text-center lg:text-left">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">Total Karyawan</p>
                        <h4 class="text-2xl font-black text-slate-800" x-text="karyawan.length">0</h4>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2 bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
                        <h4 class="text-[10px] font-bold text-slate-400 uppercase mb-4 tracking-widest">Trend Temuan Bulanan</h4>
                        <div class="h-60"><canvas id="barChart"></canvas></div>
                    </div>
                    <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
                        <h4 class="text-[10px] font-bold text-slate-400 uppercase mb-4 tracking-widest text-center">Persentase Status</h4>
                        <div class="h-60 flex justify-center"><canvas id="pieChart"></canvas></div>
                    </div>
                </div>

                <div class="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
                    <div class="p-5 border-b border-slate-50 flex justify-between items-center bg-slate-50/30">
                        <div>
                            <h4 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">10 Aktivitas Terbaru</h4>
                            <p class="text-[9px] text-slate-400 mt-0.5">Urutan berdasarkan data paling terkini</p>
                        </div>
                        <span class="text-[9px] bg-blue-100 text-blue-700 px-2 py-1 rounded-md font-black" x-text="Math.min(filteredNearmiss.length, 10) + ' DATA'"></span>
                    </div>
                    
                    <div class="block lg:hidden divide-y divide-slate-50">
                        <template x-for="(n, index) in filteredNearmiss.slice(0, 10)" :key="index">
                            <div class="p-4 space-y-2 hover:bg-slate-50 transition-colors">
                                <div class="flex justify-between items-start">
                                    <span class="text-[9px] text-slate-400 font-bold bg-slate-100 px-2 py-0.5 rounded" x-text="formatDate(n.when)"></span>
                                    <span :class="(n.note === 'Close' || n.status === 'Close') ? 'text-green-600' : 'text-red-600'" 
                                          class="text-[9px] font-black uppercase tracking-tighter"
                                          x-text="(n.note === 'Close' || n.status === 'Close') ? '● Closed' : '● Pending'">
                                    </span>
                                </div>
                                <div>
                                    <div class="text-[11px] font-extrabold text-slate-800 uppercase" x-text="n.nama"></div>
                                    <div class="text-[10px] text-slate-600 mt-1 leading-relaxed uppercase" x-text="n.detail || n.temuan"></div>
                                </div>
                                <div class="flex items-center gap-1 text-blue-500">
                                    <i data-lucide="map-pin" class="w-3 h-3"></i>
                                    <span class="text-[9px] font-bold uppercase" x-text="n.where || n.lokasi"></span>
                                </div>
                            </div>
                        </template>
                    </div>

                    <div class="hidden lg:block overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-slate-50/50 text-slate-400 text-[9px] uppercase font-bold">
                                <tr>
                                    <th class="px-6 py-4">Waktu Kejadian</th>
                                    <th class="px-6 py-4">Nama Pelapor</th>
                                    <th class="px-6 py-4">Detail Temuan</th>
                                    <th class="px-6 py-4 text-center">Status</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-50">
                                <template x-for="(n, index) in filteredNearmiss.slice(0, 10)" :key="index">
                                    <tr class="hover:bg-blue-50/30 transition-colors group">
                                        <td class="px-6 py-4 text-[10px] text-slate-500 font-medium" x-text="formatDate(n.when)"></td>
                                        <td class="px-6 py-4">
                                            <div class="text-[11px] font-bold text-slate-700 uppercase" x-text="n.nama"></div>
                                            <div class="text-[9px] text-blue-500 font-bold" x-text="n.nik"></div>
                                        </td>
                                        <td class="px-6 py-4">
                                            <div class="text-[11px] text-slate-600 font-semibold truncate max-w-xs uppercase" x-text="n.detail || n.temuan"></div>
                                            <div class="text-[9px] text-slate-400 italic flex items-center gap-1 mt-0.5">
                                                <i data-lucide="map-pin" class="w-2.5 h-2.5"></i>
                                                <span x-text="n.where || n.lokasi"></span>
                                            </div>
                                        </td>
                                        <td class="px-6 py-4 text-center">
                                            <span :class="(n.note === 'Close' || n.status === 'Close') ? 'bg-green-100 text-green-600 border-green-200' : 'bg-red-100 text-red-600 border-red-200'" 
                                                  class="text-[9px] px-3 py-1 rounded-full font-black uppercase border"
                                                  x-text="(n.note === 'Close' || n.status === 'Close') ? 'Closed' : 'Pending'">
                                            </span>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const SPREADSHEET_API = "https://script.google.com/macros/s/AKfycbwlvT2uodaiijE_nNuKXPbasI0gvtSE9vQTDOtRjFshr3RyvW9eIR8B17NVIVwUK5zfiw/exec";

        function appData() {
            return {
                sidebarOpen: window.innerWidth > 1024,
                isSyncing: false,
                allNearmiss: [],
                filteredNearmiss: [],
                karyawan: [],
                startDate: '',
                endDate: '',
                charts: {},

                async initApp() {
                    lucide.createIcons();
                    window.addEventListener('resize', () => {
                        if(window.innerWidth < 1024) this.sidebarOpen = false;
                    });
                    await this.loadData();
                },

                async loadData() {
                    this.isSyncing = true;
                    try {
                        const response = await fetch(`${SPREADSHEET_API}?t=${new Date().getTime()}`);
                        const data = await response.json();
                        // Simpan data & Urutkan berdasarkan waktu terbaru (Desc)
                        this.allNearmiss = (data.nearmiss || []).sort((a, b) => new Date(b.when) - new Date(a.when));
                        this.karyawan = data.karyawan || [];
                        this.updateDashboard();
                    } catch (error) {
                        console.error("Gagal sinkron data:", error);
                    } finally {
                        this.isSyncing = false;
                        setTimeout(() => lucide.createIcons(), 100);
                    }
                },

                updateDashboard() {
                    this.filteredNearmiss = this.allNearmiss.filter(n => {
                        if (!n.when) return false;
                        const recordDate = new Date(n.when).getTime();
                        const start = this.startDate ? new Date(this.startDate).setHours(0,0,0,0) : null;
                        const end = this.endDate ? new Date(this.endDate).setHours(23,59,59,999) : null;
                        if (start && recordDate < start) return false;
                        if (end && recordDate > end) return false;
                        return true;
                    });
                    this.renderCharts();
                },

                countPending() {
                    return this.filteredNearmiss.filter(n => (n.note || n.status || '').toLowerCase() !== 'close').length;
                },

                countClosed() {
                    return this.filteredNearmiss.filter(n => (n.note || n.status || '').toLowerCase() === 'close').length;
                },

                formatDate(dateString) {
                    if (!dateString) return '-';
                    const date = new Date(dateString);
                    return date.toLocaleDateString('id-ID', { day: '2-digit', month: 'short' }) + ' ' + 
                           date.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
                },

                renderCharts() {
                    if (this.charts.bar) this.charts.bar.destroy();
                    if (this.charts.pie) this.charts.pie.destroy();

                    const ctxBar = document.getElementById('barChart').getContext('2d');
                    this.charts.bar = new Chart(ctxBar, {
                        type: 'bar',
                        data: {
                            labels: ['Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des', 'Jan', 'Feb', 'Mar'],
                            datasets: [{
                                label: 'Temuan',
                                data: this.mapMonthlyData(),
                                backgroundColor: '#3b82f6',
                                borderRadius: 4,
                                barThickness: 10
                            }]
                        },
                        options: { 
                            responsive: true, 
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: { 
                                y: { beginAtZero: true, grid: { color: '#f1f5f9' }, ticks: { font: { size: 9 } } },
                                x: { grid: { display: false }, ticks: { font: { size: 9 } } }
                            }
                        }
                    });

                    const ctxPie = document.getElementById('pieChart').getContext('2d');
                    this.charts.pie = new Chart(ctxPie, {
                        type: 'doughnut',
                        data: {
                            labels: ['Open', 'Close'],
                            datasets: [{
                                data: [this.countPending(), this.countClosed()],
                                backgroundColor: ['#ef4444', '#22c55e'],
                                borderWidth: 0,
                                cutout: '70%'
                            }]
                        },
                        options: { 
                            responsive: true, 
                            maintainAspectRatio: false,
                            plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10, weight: 'bold' } } } }
                        }
                    });
                },

                mapMonthlyData() {
                    const monthlyCounts = new Array(12).fill(0);
                    this.filteredNearmiss.forEach(n => {
                        const date = new Date(n.when); 
                        if (!isNaN(date)) {
                            let monthIdx = date.getMonth() - 3; 
                            if (monthIdx < 0) monthIdx += 12;
                            if (monthIdx >= 0 && monthIdx < 12) monthlyCounts[monthIdx]++;
                        }
                    });
                    return monthlyCounts;
                },

                logout() {
                    localStorage.clear();
                    window.location.href = 'index.html';
                }
            }
        }
    </script>
</body>
</html>
