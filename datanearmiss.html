<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nearmiss Monitoring - Painting 2W</title>
    
    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true') window.location.replace('index.html');
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .active-link { background: #2563eb; color: white !important; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>

<body x-data="nearmissApp()" x-init="init()" class="antialiased text-slate-900">

    <div class="flex h-screen overflow-hidden">
        <aside :class="sidebarOpen ? 'w-64' : 'w-20'" 
               class="hidden lg:flex flex-col bg-[#0f172a] text-white transition-all duration-300 z-50">
            <div class="p-6">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-600 p-2 rounded-lg">
                        <i data-lucide="shield-check" class="w-6 h-6"></i>
                    </div>
                    <h1 x-show="sidebarOpen" class="font-bold text-xl tracking-tight">P2W<span class="text-blue-500 text-sm">Safety</span></h1>
                </div>
            </div>

            <nav class="flex-1 px-4 mt-4 space-y-2">
                <a href="dashboard.html" class="flex items-center px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 transition-all group">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                    <span x-show="sidebarOpen" class="ml-3 font-medium">Dashboard</span>
                </a>
                <a href="#" class="flex items-center px-4 py-3 rounded-xl active-link">
                    <i data-lucide="alert-triangle" class="w-5 h-5"></i>
                    <span x-show="sidebarOpen" class="ml-3 font-medium">Data Nearmiss</span>
                </a>
                <a href="datakaryawan.html" class="flex items-center px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 transition-all group">
                    <i data-lucide="users" class="w-5 h-5"></i>
                    <span x-show="sidebarOpen" class="ml-3 font-medium">Karyawan</span>
                </a>
            </nav>

            <div class="p-4 border-t border-slate-800">
                <button @click="logout()" class="flex items-center w-full px-4 py-3 rounded-xl text-red-400 hover:bg-red-500/10 transition-all">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                    <span x-show="sidebarOpen" class="ml-3 font-medium">Logout</span>
                </button>
            </div>
        </aside>

        <div class="flex-1 flex flex-col min-w-0 bg-slate-50">
            <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <button @click="sidebarOpen = !sidebarOpen" class="p-2 text-slate-600 hover:bg-slate-100 rounded-lg">
                        <i data-lucide="menu" class="w-6 h-6"></i>
                    </button>
                    <h2 class="text-lg font-bold text-slate-800">Manajemen Temuan Safety</h2>
                </div>
                <div class="flex items-center gap-3">
                    <span class="hidden md:block text-xs font-semibold text-slate-400 bg-slate-100 px-3 py-1 rounded-full uppercase">Painting 2W Plant</span>
                    <button @click="fetchData()" class="p-2 rounded-full hover:bg-blue-50 text-blue-600 transition-all">
                        <i data-lucide="refresh-cw" :class="loading ? 'animate-spin' : ''" class="w-5 h-5"></i>
                    </button>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-4 lg:p-8 custom-scrollbar">
                <div class="mb-6 grid grid-cols-1 md:grid-cols-12 gap-4">
                    <div class="md:col-span-5 relative">
                        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
                        <input type="text" x-model="search" placeholder="Cari NIK, Nama, atau Lokasi..." 
                               class="w-full pl-10 pr-4 py-2.5 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-500/10 outline-none transition-all shadow-sm">
                    </div>
                    <div class="md:col-span-3">
                        <select x-model="filterLine" class="w-full px-4 py-2.5 bg-white border border-slate-200 rounded-xl outline-none shadow-sm cursor-pointer">
                            <option value="all">Semua Line</option>
                            <template x-for="line in lines" :key="line">
                                <option :value="line" x-text="line"></option>
                            </template>
                        </select>
                    </div>
                    <div class="md:col-span-4 flex gap-2">
                        <select x-model="filterStatus" class="flex-1 px-4 py-2.5 bg-white border border-slate-200 rounded-xl outline-none shadow-sm cursor-pointer">
                            <option value="all">Semua Status</option>
                            <option value="Belum Close">Status: Open</option>
                            <option value="Close">Status: Closed</option>
                        </select>
                        <button @click="triggerModal()" class="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 active:scale-95 transition-all">
                            Buat Laporan
                        </button>
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50/50 border-b border-slate-200">
                                <tr class="text-[11px] font-bold text-slate-500 uppercase tracking-widest">
                                    <th class="px-6 py-4 text-center w-12">No</th>
                                    <th class="px-6 py-4">Informasi Pelapor</th>
                                    <th class="px-6 py-4">Temuan & Lokasi</th>
                                    <th class="px-6 py-4">Countermeasure</th>
                                    <th class="px-6 py-4 text-center">Status</th>
                                    <th class="px-6 py-4 text-right">Opsi</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100">
                                <template x-for="(item, i) in filteredData" :key="i">
                                    <tr class="hover:bg-slate-50/80 transition-colors group">
                                        <td class="px-6 py-4 text-center text-slate-400 text-sm" x-text="i + 1"></td>
                                        <td class="px-6 py-4">
                                            <div class="font-bold text-slate-800" x-text="item.nama"></div>
                                            <div class="text-[10px] text-slate-500 font-medium" x-text="'NIK: ' + item.nik"></div>
                                        </td>
                                        <td class="px-6 py-4">
                                            <div class="text-[10px] font-extrabold text-blue-600 mb-1" x-text="item.where"></div>
                                            <div class="text-sm text-slate-600 leading-tight" x-text="item.detail"></div>
                                            <div class="text-[10px] text-slate-400 mt-1.5 flex items-center gap-1">
                                                <i data-lucide="calendar" class="w-3 h-3"></i>
                                                <span x-text="prettyDate(item.when)"></span>
                                            </div>
                                        </td>
                                        <td class="px-6 py-4">
                                            <div class="text-sm text-slate-600 italic" x-text="item.measure || 'Menunggu tindakan...'"></div>
                                            <template x-if="item.tergetdate">
                                                <div class="text-[10px] text-red-500 font-bold mt-1 uppercase" x-text="'Deadline: ' + prettyDate(item.tergetdate)"></div>
                                            </template>
                                        </td>
                                        <td class="px-6 py-4 text-center">
                                            <span :class="item.note === 'Close' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'" 
                                                  class="px-3 py-1 rounded-full text-[10px] font-black uppercase"
                                                  x-text="item.note === 'Close' ? 'Closed' : 'Open'"></span>
                                        </td>
                                        <td class="px-6 py-4">
                                            <div class="flex justify-end gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                                <button @click="triggerModal(item)" class="p-2 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                                                <button @click="handleDelete(item.nik, item.when)" class="p-2 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-lg"><i data-lucide="trash" class="w-4 h-4"></i></button>
                                            </div>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>

                    <div x-show="filteredData.length === 0" class="py-20 text-center">
                        <div class="inline-flex p-4 rounded-full bg-slate-50 mb-4">
                            <i data-lucide="search-x" class="w-10 h-10 text-slate-300"></i>
                        </div>
                        <h3 class="text-slate-800 font-bold">Data tidak ditemukan</h3>
                        <p class="text-slate-400 text-sm">Coba sesuaikan kata kunci atau filter Anda.</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div x-show="modal" x-cloak class="fixed inset-0 z-[999] flex items-center justify-center p-4">
        <div @click="modal = false" class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
        <div class="relative bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden shadow-blue-900/20">
            <div class="bg-slate-50 px-8 py-5 border-b border-slate-100 flex justify-between items-center">
                <div>
                    <h3 class="font-extrabold text-slate-800 text-lg" x-text="editing ? 'Edit Laporan Safety' : 'Buat Laporan Baru'"></h3>
                    <p class="text-xs text-slate-500">Pastikan data yang dimasukkan sudah sesuai fakta lapangan.</p>
                </div>
                <button @click="modal = false" class="text-slate-400 hover:bg-white p-2 rounded-full transition-all"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            
            <form @submit.prevent="handleSubmit" class="p-8 space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">NIK Pelapor</label>
                        <input type="text" x-model="form.NIK" required placeholder="Input NIK" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:border-blue-500 outline-none transition-all">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Nama Pelapor</label>
                        <input type="text" x-model="form.Nama" readonly class="w-full px-4 py-3 bg-slate-100 text-slate-500 border border-slate-200 rounded-xl text-sm font-medium">
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Lokasi Kejadian (Where)</label>
                    <input type="text" x-model="form.where" required placeholder="Contoh: Area Loading Painting" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-blue-500">
                </div>

                <div class="space-y-1.5">
                    <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Detail Temuan Bahaya</label>
                    <textarea x-model="form.detail" rows="3" required placeholder="Jelaskan potensi bahaya yang ditemukan..." class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-blue-500"></textarea>
                </div>

                <div class="space-y-1.5">
                    <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Countermeasure / Penanganan</label>
                    <input type="text" x-model="form.measure" placeholder="Apa tindakan yang sudah/akan diambil?" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-blue-500">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Waktu Temuan</label>
                        <input type="datetime-local" x-model="form.When" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Status Close</label>
                        <select x-model="form.note" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none font-bold">
                            <option value="Belum Close">OPEN</option>
                            <option value="Close">CLOSED</option>
                        </select>
                    </div>
                </div>

                <button type="submit" :disabled="loading" 
                        class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-xl shadow-blue-200 hover:bg-blue-700 disabled:bg-slate-300 transition-all flex items-center justify-center gap-2">
                    <i x-show="loading" data-lucide="loader" class="w-5 h-5 animate-spin"></i>
                    <span x-text="loading ? 'Menyimpan...' : (editing ? 'Update Laporan' : 'Simpan Laporan')"></span>
                </button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwlvT2uodaiijE_nNuKXPbasI0gvtSE9vQTDOtRjFshr3RyvW9eIR8B17NVIVwUK5zfiw/exec";

        function nearmissApp() {
            return {
                sidebarOpen: true,
                loading: false,
                modal: false,
                editing: false,
                search: '',
                filterStatus: 'all',
                filterLine: 'all',
                rawNearmiss: [],
                rawKaryawan: [],
                form: {
                    NIK: '', Nama: '', When: '', originalWhen: '',
                    where: '', detail: '', measure: '', tergetdate: '', note: 'Belum Close'
                },

                async init() {
                    lucide.createIcons();
                    await this.fetchData();
                    this.$watch('form.NIK', v => this.lookupKaryawan(v));
                },

                async fetchData() {
                    this.loading = true;
                    try {
                        const res = await fetch(`${API_URL}?t=${Date.now()}`);
                        const data = await res.json();
                        this.rawNearmiss = data.nearmiss || [];
                        this.rawKaryawan = data.karyawan || [];
                    } catch (e) { alert("Error koneksi database"); }
                    finally { 
                        this.loading = false;
                        this.$nextTick(() => lucide.createIcons());
                    }
                },

                lookupKaryawan(nik) {
                    if (!nik) { this.form.Nama = ''; return; }
                    const match = this.rawKaryawan.find(k => k.nik?.toString().trim() === nik.toString().trim());
                    this.form.Nama = match ? match.nama : 'NIK TIDAK TERDAFTAR';
                },

                triggerModal(item = null) {
                    this.editing = !!item;
                    if (item) {
                        // Handle date for local input
                        const dt = new Date(item.when);
                        const localTime = new Date(dt.getTime() - (dt.getTimezoneOffset() * 60000)).toISOString().slice(0, 16);
                        
                        this.form = { 
                            ...item, NIK: item.nik, Nama: item.nama, When: localTime, 
                            originalWhen: item.when, note: item.note || 'Belum Close' 
                        };
                    } else {
                        const now = new Date();
                        const localNow = new Date(now.getTime() - (now.getTimezoneOffset() * 60000)).toISOString().slice(0, 16);
                        this.form = { NIK: '', Nama: '', When: localNow, originalWhen: '', where: '', detail: '', measure: '', tergetdate: '', note: 'Belum Close' };
                    }
                    this.modal = true;
                    this.$nextTick(() => lucide.createIcons());
                },

                async handleSubmit() {
                    if (this.form.Nama === 'NIK TIDAK TERDAFTAR') return alert("Cek kembali NIK Anda");
                    this.loading = true;
                    const payload = {
                        action: this.editing ? 'updateNearmiss' : 'addNearmiss',
                        data: { ...this.form },
                        nik: this.form.NIK,
                        when: this.form.originalWhen
                    };
                    try {
                        const r = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                        if ((await r.json()).status === 'success') {
                            this.modal = false;
                            await this.fetchData();
                        }
                    } catch (e) { alert("Gagal menyimpan data"); }
                    finally { this.loading = false; }
                },

                async handleDelete(nik, when) {
                    if (!confirm("Hapus permanen laporan ini?")) return;
                    this.loading = true;
                    try {
                        await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteNearmiss', nik, when }) });
                        await this.fetchData();
                    } catch (e) { alert("Gagal menghapus"); }
                    finally { this.loading = false; }
                },

                prettyDate(str) {
                    if (!str) return '-';
                    const d = new Date(str);
                    return isNaN(d) ? str : d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
                },

                get lines() {
                    const l = this.rawKaryawan.map(k => k.line || k.Line).filter(Boolean);
                    return [...new Set(l)].sort();
                },

                get filteredData() {
                    return this.rawNearmiss.filter(n => {
                        const k = this.rawKaryawan.find(ky => ky.nik?.toString() === n.nik?.toString());
                        const l = k ? (k.line || k.Line) : '-';
                        const s = this.search.toLowerCase();
                        
                        const matchText = n.nama?.toLowerCase().includes(s) || n.nik?.toString().includes(s) || n.where?.toLowerCase().includes(s);
                        const matchStatus = this.filterStatus === 'all' || (n.note === 'Close' ? 'Close' : 'Belum Close') === this.filterStatus;
                        const matchLine = this.filterLine === 'all' || l === this.filterLine;
                        
                        return matchText && matchStatus && matchLine;
                    });
                },

                logout() {
                    if (confirm("Logout dari sistem?")) {
                        localStorage.clear();
                        window.location.replace("index.html");
                    }
                }
            }
        }
    </script>
</body>
</html>
