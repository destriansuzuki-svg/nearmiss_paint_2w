<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nearmiss - Painting 2W</title>
    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.replace('index.html');
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .sidebar-active { background: linear-gradient(90deg, #2563eb, #3b82f6); color: white !important; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        /* Mobile Table Transformation */
        @media (max-width: 768px) {
            .responsive-table thead { display: none; }
            .responsive-table tr { 
                display: block; 
                margin-bottom: 1rem; 
                border: 1px solid #f1f5f9; 
                border-radius: 1.5rem; 
                background: white;
                padding: 1rem;
            }
            .responsive-table td { 
                display: flex; 
                justify-content: space-between; 
                padding: 0.5rem 0 !important; 
                border: none !important;
                text-align: right;
            }
            .responsive-table td::before {
                content: attr(data-label);
                font-weight: 800;
                text-transform: uppercase;
                font-size: 10px;
                color: #64748b;
                text-align: left;
            }
        }
    </style>
</head>
<body x-data="nearmissApp()" x-init="initApp()" class="overflow-hidden">

    <div class="flex h-screen w-full">
        <aside :class="sidebarOpen ? 'w-64' : 'w-20'" class="hidden md:flex bg-[#0f172a] text-white transition-all duration-300 flex-col z-50">
            <div class="p-6 flex items-center justify-between">
                <h1 x-show="sidebarOpen" class="font-black text-lg italic tracking-tighter uppercase">
                    <span class="text-blue-500">Painting</span>2W
                </h1>
                <button @click="sidebarOpen = !sidebarOpen" class="text-slate-400 hover:text-white">
                    <i data-lucide="menu" class="w-5 h-5"></i>
                </button>
            </div>
            <nav class="flex-1 px-3 space-y-1">
                <a href="dashboard.html" class="flex items-center px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 transition-all">
                    <i data-lucide="layout-grid" class="w-5 h-5"></i>
                    <span x-show="sidebarOpen" class="ml-3 text-[11px] font-bold tracking-widest uppercase">Dashboard</span>
                </a>
                <a href="#" class="flex items-center px-4 py-3 rounded-xl sidebar-active transition-all">
                    <i data-lucide="alert-triangle" class="w-5 h-5"></i>
                    <span x-show="sidebarOpen" class="ml-3 text-[11px] font-bold tracking-widest uppercase">Nearmiss</span>
                </a>
                <a href="datakaryawan.html" class="flex items-center px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 transition-all">
                    <i data-lucide="users" class="w-5 h-5"></i>
                    <span x-show="sidebarOpen" class="ml-3 text-[11px] font-bold tracking-widest uppercase">Karyawan</span>
                </a>
            </nav>
            <div class="p-4 border-t border-slate-800">
                <button @click="logout()" class="flex items-center w-full px-4 py-3 text-red-400 hover:bg-red-500/10 rounded-xl transition-all">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                    <span x-show="sidebarOpen" class="ml-3 text-[11px] font-bold uppercase">Keluar</span>
                </button>
            </div>
        </aside>

        <div class="flex-1 flex flex-col min-w-0 h-screen">
            <header class="bg-white px-4 md:px-8 py-4 flex justify-between items-center border-b shadow-sm">
                <div class="flex items-center gap-3">
                    <button @click="sidebarOpen = !sidebarOpen" class="md:hidden text-slate-600">
                        <i data-lucide="menu" class="w-6 h-6"></i>
                    </button>
                    <h2 class="text-lg md:text-xl font-extrabold text-slate-800 italic uppercase">Data Nearmiss</h2>
                </div>
                <button @click="loadData()" class="p-2 bg-slate-50 rounded-full border border-slate-100 hover:bg-white transition-all">
                    <i data-lucide="refresh-cw" class="w-4 h-4 text-slate-500" :class="isSyncing ? 'animate-spin text-blue-500' : ''"></i>
                </button>
            </header>

            <main class="flex-1 overflow-y-auto p-4 md:p-6 space-y-4 custom-scroll">
                <div class="bg-white p-3 md:p-4 rounded-2xl md:rounded-[2rem] shadow-sm border flex flex-col md:flex-row items-center gap-3">
                    <div class="relative w-full md:flex-1">
                        <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 w-4 h-4"></i>
                        <input type="text" x-model="searchQuery" placeholder="Cari laporan..." class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border-none rounded-xl text-xs md:text-sm">
                    </div>
                    
                    <div class="flex w-full md:w-auto gap-2 overflow-x-auto pb-1 md:pb-0">
                        <select x-model="filterLine" class="bg-slate-100 px-3 py-2 rounded-xl text-[10px] font-bold uppercase text-blue-600 outline-none border-none">
                            <option value="all">Semua Line</option>
                            <template x-for="line in uniqueLines" :key="line">
                                <option :value="line" x-text="line"></option>
                            </template>
                        </select>
                        <select x-model="currentFilter" class="bg-slate-100 px-3 py-2 rounded-xl text-[10px] font-bold uppercase text-slate-600 outline-none border-none">
                            <option value="all">Semua Status</option>
                            <option value="Belum Close">Open</option>
                            <option value="Close">Closed</option>
                        </select>
                        <button @click="openForm()" class="whitespace-nowrap bg-blue-600 text-white px-4 py-2 rounded-xl font-bold text-[10px] uppercase tracking-wider hover:bg-blue-700">+ Baru</button>
                    </div>
                </div>

                <div class="md:bg-white md:rounded-[2.5rem] md:shadow-sm md:border overflow-hidden">
                    <div class="overflow-x-auto md:p-4">
                        <table class="w-full responsive-table border-separate border-spacing-y-2">
                            <thead class="hidden md:table-header-group">
                                <tr class="bg-slate-800">
                                    <th class="p-4 pl-8 rounded-l-full text-[9px] font-black uppercase text-white text-left">Pelapor</th>
                                    <th class="p-4 text-[9px] font-black uppercase text-white text-left">Detail Temuan</th>
                                    <th class="p-4 text-[9px] font-black uppercase text-white text-left">Countermeasure</th>
                                    <th class="p-4 text-[9px] font-black uppercase text-white text-center">Status</th>
                                    <th class="p-4 pr-8 rounded-r-full text-[9px] font-black uppercase text-white text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody class="text-xs md:text-sm">
                                <template x-for="(n, idx) in filteredNearmiss" :key="idx">
                                    <tr class="hover:bg-slate-50 transition-colors group bg-white md:bg-transparent rounded-2xl">
                                        <td data-label="Pelapor" class="p-4 md:pl-8 border-b border-slate-50 align-top">
                                            <div class="text-left">
                                                <div class="font-bold text-slate-700 uppercase" x-text="n.nama"></div>
                                                <div class="text-[10px] text-blue-500 font-bold" x-text="n.nik"></div>
                                                <div class="text-[9px] text-slate-400" x-text="formatDate(n.when)"></div>
                                            </div>
                                        </td>
                                        <td data-label="Temuan" class="p-4 border-b border-slate-50 align-top md:max-w-[250px]">
                                            <div class="text-left">
                                                <div class="font-bold uppercase text-slate-600 mb-1 text-[10px]" x-text="n.where"></div>
                                                <div :class="n.expanded ? '' : 'line-clamp-2'" class="text-slate-500 text-[11px]" x-text="n.detail"></div>
                                                <button x-show="n.detail.length > 60" @click="n.expanded = !n.expanded" class="text-blue-500 font-bold text-[9px] mt-1" x-text="n.expanded ? 'Sembunyikan' : 'Selengkapnya'"></button>
                                            </div>
                                        </td>
                                        <td data-label="Penanganan" class="p-4 border-b border-slate-50 align-top md:max-w-[250px]">
                                            <div class="text-left">
                                                <div class="text-slate-500 text-[11px]" x-text="n.measure || '-'"></div>
                                                <div class="text-[9px] font-bold text-slate-400 mt-1" x-show="n.tergetdate">Target: <span x-text="formatDate(n.tergetdate)"></span></div>
                                            </div>
                                        </td>
                                        <td data-label="Status" class="p-4 text-center border-b border-slate-50 align-top">
                                            <span :class="n.note === 'Close' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'" class="text-[9px] px-3 py-1 rounded-full font-black uppercase" x-text="n.note === 'Close' ? 'Closed' : 'Open'"></span>
                                        </td>
                                        <td data-label="Opsi" class="p-4 md:pr-8 text-center border-b border-slate-50 align-top">
                                            <div class="flex gap-2 justify-end md:justify-center">
                                                <button @click="editData(n)" class="p-2 text-blue-500 bg-blue-50 md:bg-transparent rounded-lg"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                                                <button @click="deleteData(n.nik, n.when)" class="p-2 text-red-500 bg-red-50 md:bg-transparent rounded-lg"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                            </div>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div x-show="showForm" x-cloak class="fixed inset-0 z-[100] flex items-end md:items-center justify-center bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg rounded-t-[2rem] md:rounded-[2.5rem] shadow-2xl overflow-hidden p-6 md:p-8 space-y-4 md:space-y-6 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center border-b pb-4">
                <h3 class="text-xs md:text-sm font-black uppercase italic" x-text="isEdit ? 'Edit Laporan' : 'Laporan Baru'"></h3>
                <button @click="showForm = false" class="text-slate-400"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            
            <form @submit.prevent="submitForm" class="grid grid-cols-2 gap-3 md:gap-4">
                <div class="col-span-2 md:col-span-1">
                    <label class="text-[9px] font-black uppercase text-slate-400 ml-1">NIK</label>
                    <input type="text" x-model="formData.NIK" required class="w-full px-4 py-2.5 bg-slate-50 rounded-xl border-none text-xs outline-none ring-1 ring-slate-100 focus:ring-blue-500">
                </div>
                <div class="col-span-2 md:col-span-1">
                    <label class="text-[9px] font-black uppercase text-slate-400 ml-1">Nama</label>
                    <input type="text" x-model="formData.Nama" readonly class="w-full px-4 py-2.5 bg-slate-100 text-slate-500 rounded-xl border-none text-xs">
                </div>
                <div class="col-span-2 md:col-span-1">
                    <label class="text-[9px] font-black uppercase text-slate-400 ml-1">Waktu</label>
                    <input type="datetime-local" x-model="formData.When" required class="w-full px-4 py-2.5 bg-slate-50 rounded-xl border-none text-xs outline-none ring-1 ring-slate-100">
                </div>
                <div class="col-span-2 md:col-span-1">
                    <label class="text-[9px] font-black uppercase text-slate-400 ml-1">Target</label>
                    <input type="date" x-model="formData.tergetdate" class="w-full px-4 py-2.5 bg-slate-50 rounded-xl border-none text-xs outline-none ring-1 ring-slate-100">
                </div>
                <div class="col-span-2">
                    <label class="text-[9px] font-black uppercase text-slate-400 ml-1">Lokasi</label>
                    <input type="text" x-model="formData.where" required class="w-full px-4 py-2.5 bg-slate-50 rounded-xl border-none text-xs outline-none ring-1 ring-slate-100">
                </div>
                <div class="col-span-2">
                    <label class="text-[9px] font-black uppercase text-slate-400 ml-1">Detail</label>
                    <textarea x-model="formData.detail" rows="3" required class="w-full px-4 py-2.5 bg-slate-50 rounded-xl border-none text-xs outline-none ring-1 ring-slate-100"></textarea>
                </div>
                <div class="col-span-2">
                    <label class="text-[9px] font-black uppercase text-slate-400 ml-1">Countermeasure</label>
                    <input type="text" x-model="formData.measure" class="w-full px-4 py-2.5 bg-slate-50 rounded-xl border-none text-xs outline-none ring-1 ring-slate-100">
                </div>
                <div class="col-span-2">
                    <label class="text-[9px] font-black uppercase text-slate-400 ml-1">Status</label>
                    <select x-model="formData.note" class="w-full px-4 py-2.5 bg-slate-50 rounded-xl border-none text-xs outline-none ring-1 ring-slate-100">
                        <option value="Belum Close">Open</option>
                        <option value="Close">Closed</option>
                    </select>
                </div>
                <div class="col-span-2 pt-2 pb-4">
                    <button type="submit" :disabled="isSyncing" class="w-full bg-blue-600 text-white py-3 rounded-xl font-black text-xs uppercase tracking-widest shadow-lg" x-text="isSyncing ? 'SEDANG MEMPROSES...' : 'SIMPAN LAPORAN'"></button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SPREADSHEET_API = "https://script.google.com/macros/s/AKfycbwlvT2uodaiijE_nNuKXPbasI0gvtSE9vQTDOtRjFshr3RyvW9eIR8B17NVIVwUK5zfiw/exec";

        function nearmissApp() {
            return {
                sidebarOpen: true,
                isSyncing: false,
                showForm: false,
                isEdit: false,
                searchQuery: '',
                currentFilter: 'all',
                filterLine: 'all',
                nearmiss: [],
                karyawan: [],
                formData: { NIK: '', Nama: '', When: '', originalWhen: '', where: '', detail: '', measure: '', tergetdate: '', note: 'Belum Close' },

                async initApp() {
                    lucide.createIcons();
                    await this.loadData();
                    this.$watch('formData.NIK', (v) => {
                        const found = this.karyawan.find(k => k.nik && k.nik.toString().trim() === v.toString().trim());
                        this.formData.Nama = found ? found.nama : (v ? 'NIK TIDAK DITEMUKAN' : '');
                    });
                },

                async loadData() {
                    this.isSyncing = true;
                    try {
                        const r = await fetch(`${SPREADSHEET_API}?t=${Date.now()}`);
                        const d = await r.json();
                        this.nearmiss = (d.nearmiss || []).map(i => ({ ...i, expanded: false }));
                        this.karyawan = d.karyawan || [];
                    } catch (e) { console.error(e); }
                    finally { this.isSyncing = false; setTimeout(() => lucide.createIcons(), 100); }
                },

                get filteredNearmiss() {
                    let filtered = this.nearmiss.filter(n => {
                        const k = this.karyawan.find(ky => ky.nik && ky.nik.toString() === n.nik.toString());
                        const line = k ? (k.line || k.Line) : '-';
                        const matchText = [n.nama, n.nik, n.where].some(v => (v || '').toString().toLowerCase().includes(this.searchQuery.toLowerCase()));
                        const matchStatus = this.currentFilter === 'all' || (n.note === 'Close' ? 'Close' : 'Belum Close') === this.currentFilter;
                        const matchLine = this.filterLine === 'all' || line === this.filterLine;
                        return matchText && matchStatus && matchLine;
                    });
                    // Agar DATA TERBARU PALING ATAS
                    return filtered.reverse();
                },

                get uniqueLines() {
                    const lines = this.karyawan.map(k => k.line || k.Line).filter(l => l && l !== '-');
                    return [...new Set(lines)].sort();
                },

                openForm() {
                    this.isEdit = false;
                    const now = new Date();
                    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
                    this.formData = { NIK: '', Nama: '', When: now.toISOString().slice(0, 16), originalWhen: '', where: '', detail: '', measure: '', tergetdate: '', note: 'Belum Close' };
                    this.showForm = true;
                },

                editData(item) {
                    this.isEdit = true;
                    this.formData = { ...item, NIK: item.nik, Nama: item.nama, When: item.when ? new Date(item.when).toISOString().slice(0, 16) : '', originalWhen: item.when };
                    this.showForm = true;
                },

                async submitForm() {
                    if (!this.formData.Nama || this.formData.Nama === 'NIK TIDAK DITEMUKAN') return alert("NIK Tidak Valid");
                    this.isSyncing = true;
                    const action = this.isEdit ? 'updateNearmiss' : 'addNearmiss';
                    try {
                        const r = await fetch(SPREADSHEET_API, { method: 'POST', body: JSON.stringify({ action, data: this.formData, nik: this.formData.NIK, when: this.formData.originalWhen }) });
                        const res = await r.json();
                        if (res.status === 'success') { this.showForm = false; await this.loadData(); }
                    } catch (e) { alert("Error simpan data"); }
                    finally { this.isSyncing = false; }
                },

                async deleteData(nik, when) {
                    if (!confirm("Hapus laporan ini?")) return;
                    this.isSyncing = true;
                    try {
                        const r = await fetch(SPREADSHEET_API, { method: 'POST', body: JSON.stringify({ action: 'deleteNearmiss', nik, when }) });
                        const res = await r.json();
                        if (res.status === 'success') await this.loadData();
                    } catch (e) { alert("Gagal hapus"); }
                    finally { this.isSyncing = false; }
                },

                formatDate(d) {
                    if (!d) return '-';
                    const date = new Date(d);
                    return isNaN(date) ? d : date.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
                },

                logout() { if(confirm("Keluar?")) { localStorage.clear(); window.location.replace("index.html"); } }
            }
        }
    </script>
</body>
</html>
