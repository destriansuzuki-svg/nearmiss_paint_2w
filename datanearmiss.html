<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nearmiss - Painting 2W</title>
    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.replace('index.html');
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .sidebar-active { background: #2563eb; color: white !important; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Glassmorphism Effect for Cards */
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body x-data="nearmissApp()" x-init="initApp()" class="antialiased text-slate-900">

    <div class="flex h-screen overflow-hidden">
        <aside :class="sidebarOpen ? 'translate-x-0 w-64' : '-translate-x-full lg:translate-x-0 lg:w-20'" 
               class="fixed lg:relative inset-y-0 left-0 bg-[#0f172a] text-white transition-all duration-300 z-[100] flex flex-col">
            
            <div class="p-6 flex items-center justify-between">
                <h1 x-show="sidebarOpen || !isMobile" class="font-bold text-xl tracking-tight">
                    <span class="text-blue-500">P2W</span><span class="text-white">Safety</span>
                </h1>
                <button @click="sidebarOpen = !sidebarOpen" class="p-1 rounded-lg bg-slate-800 lg:hidden">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <nav class="flex-1 px-4 space-y-2">
                <a href="dashboard.html" class="flex items-center px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 transition-all">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                    <span x-show="sidebarOpen" class="ml-3 font-medium">Dashboard</span>
                </a>
                <a href="#" class="flex items-center px-4 py-3 rounded-xl sidebar-active font-medium">
                    <i data-lucide="alert-circle" class="w-5 h-5"></i>
                    <span x-show="sidebarOpen" class="ml-3">Nearmiss</span>
                </a>
                <a href="datakaryawan.html" class="flex items-center px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 transition-all">
                    <i data-lucide="users" class="w-5 h-5"></i>
                    <span x-show="sidebarOpen" class="ml-3 font-medium">Karyawan</span>
                </a>
            </nav>

            <div class="p-4 border-t border-slate-800">
                <button @click="logout()" class="flex items-center w-full px-4 py-3 rounded-xl text-red-400 hover:bg-red-500/10 transition-all">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                    <span x-show="sidebarOpen" class="ml-3 font-medium">Keluar</span>
                </button>
            </div>
        </aside>

        <div class="flex-1 flex flex-col min-w-0 h-screen overflow-hidden">
            <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <button @click="sidebarOpen = !sidebarOpen" class="lg:hidden p-2 text-slate-600">
                        <i data-lucide="menu" class="w-6 h-6"></i>
                    </button>
                    <h2 class="text-lg font-bold text-slate-800">Data Nearmiss</h2>
                </div>
                
                <button @click="loadData()" class="p-2 text-slate-500 hover:text-blue-600 transition-colors">
                    <i data-lucide="rotate-cw" :class="isSyncing ? 'animate-spin' : ''" class="w-5 h-5"></i>
                </button>
            </header>

            <main class="flex-1 overflow-y-auto p-4 lg:p-8 space-y-6 custom-scroll">
                
                <div class="grid grid-cols-1 md:grid-cols-12 gap-4 items-center bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                    <div class="md:col-span-5 relative">
                        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
                        <input type="text" x-model="searchQuery" placeholder="Cari NIK, Nama, Lokasi..." 
                               class="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all text-sm">
                    </div>
                    
                    <div class="md:col-span-3">
                        <select x-model="filterLine" class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none">
                            <option value="all">Semua Line</option>
                            <template x-for="line in uniqueLines" :key="line">
                                <option :value="line" x-text="line"></option>
                            </template>
                        </select>
                    </div>

                    <div class="md:col-span-4 flex gap-2">
                        <select x-model="currentFilter" class="flex-1 px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none">
                            <option value="all">Semua Status</option>
                            <option value="Belum Close">Status: Open</option>
                            <option value="Close">Status: Closed</option>
                        </select>
                        <button @click="openForm()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all">
                            + Baru
                        </button>
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="hidden lg:block overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 border-b border-slate-200">
                                <tr>
                                    <th class="px-6 py-4 text-[11px] font-bold text-slate-500 uppercase tracking-wider text-center w-16">No</th>
                                    <th class="px-6 py-4 text-[11px] font-bold text-slate-500 uppercase tracking-wider">Pelapor</th>
                                    <th class="px-6 py-4 text-[11px] font-bold text-slate-500 uppercase tracking-wider">Temuan & Lokasi</th>
                                    <th class="px-6 py-4 text-[11px] font-bold text-slate-500 uppercase tracking-wider">Countermeasure</th>
                                    <th class="px-6 py-4 text-[11px] font-bold text-slate-500 uppercase tracking-wider text-center">Status</th>
                                    <th class="px-6 py-4 text-[11px] font-bold text-slate-500 uppercase tracking-wider text-right">Aksi</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100">
                                <template x-for="(n, idx) in filteredNearmiss" :key="idx">
                                    <tr class="hover:bg-slate-50/50 transition-colors">
                                        <td class="px-6 py-4 text-center text-slate-400 font-medium" x-text="idx + 1"></td>
                                        <td class="px-6 py-4">
                                            <div class="font-bold text-slate-800" x-text="n.nama"></div>
                                            <div class="text-[10px] text-slate-500" x-text="n.nik"></div>
                                        </td>
                                        <td class="px-6 py-4">
                                            <div class="text-[10px] font-bold text-blue-600 mb-1" x-text="n.where"></div>
                                            <div class="text-sm text-slate-600 line-clamp-1 hover:line-clamp-none transition-all" x-text="n.detail"></div>
                                            <div class="text-[10px] text-slate-400 mt-1" x-text="formatDate(n.when)"></div>
                                        </td>
                                        <td class="px-6 py-4">
                                            <div class="text-sm text-slate-600 italic" x-text="n.measure || '-'"></div>
                                            <div class="text-[10px] text-red-500 font-medium" x-show="n.tergetdate">Target: <span x-text="formatDate(n.tergetdate)"></span></div>
                                        </td>
                                        <td class="px-6 py-4 text-center">
                                            <span :class="n.note === 'Close' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'" 
                                                  class="px-3 py-1 rounded-full text-[10px] font-bold uppercase" 
                                                  x-text="n.note === 'Close' ? 'Closed' : 'Open'"></span>
                                        </td>
                                        <td class="px-6 py-4 text-right">
                                            <div class="flex justify-end gap-2">
                                                <button @click="editData(n)" class="p-2 text-slate-400 hover:text-blue-600 transition-colors"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                                                <button @click="deleteData(n.nik, n.when)" class="p-2 text-slate-400 hover:text-red-600 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                            </div>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>

                    <div class="lg:hidden divide-y divide-slate-100">
                        <template x-for="(n, idx) in filteredNearmiss" :key="idx">
                            <div class="p-5 flex flex-col gap-3">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <div class="font-bold text-slate-800" x-text="n.nama"></div>
                                        <div class="text-[10px] text-slate-500 font-medium" x-text="n.nik"></div>
                                    </div>
                                    <span :class="n.note === 'Close' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'" 
                                          class="px-2 py-0.5 rounded-full text-[9px] font-bold uppercase" 
                                          x-text="n.note === 'Close' ? 'Closed' : 'Open'"></span>
                                </div>
                                
                                <div class="bg-slate-50 rounded-xl p-3 border border-slate-100">
                                    <div class="text-[10px] font-black text-blue-600 uppercase" x-text="n.where"></div>
                                    <div class="text-xs text-slate-600 mt-1 leading-relaxed" x-text="n.detail"></div>
                                </div>

                                <div class="flex justify-between items-center text-[10px]">
                                    <div class="text-slate-400" x-text="formatDate(n.when)"></div>
                                    <div class="flex gap-4">
                                        <button @click="editData(n)" class="flex items-center gap-1 text-blue-600 font-bold uppercase tracking-wider">
                                            <i data-lucide="edit-2" class="w-3 h-3"></i> Edit
                                        </button>
                                        <button @click="deleteData(n.nik, n.when)" class="flex items-center gap-1 text-red-500 font-bold uppercase tracking-wider">
                                            <i data-lucide="trash-2" class="w-3 h-3"></i> Hapus
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>

                    <template x-if="filteredNearmiss.length === 0">
                        <div class="p-20 text-center flex flex-col items-center gap-2">
                            <i data-lucide="inbox" class="w-12 h-12 text-slate-200"></i>
                            <p class="text-slate-400 text-sm">Tidak ada data ditemukan</p>
                        </div>
                    </template>
                </div>
            </main>
        </div>
    </div>

    <div x-show="showForm" x-cloak 
         class="fixed inset-0 z-[1000] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden animate-in zoom-in duration-200">
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center">
                <h3 class="font-bold text-slate-800" x-text="isEdit ? 'Edit Laporan' : 'Laporan Baru'"></h3>
                <button @click="showForm = false" class="text-slate-400 hover:text-slate-600"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            
            <form @submit.prevent="submitForm" class="p-6 grid grid-cols-2 gap-4">
                <div class="col-span-1 space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">NIK Pelapor</label>
                    <input type="text" x-model="formData.NIK" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500/20 outline-none">
                </div>
                <div class="col-span-1 space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Nama Pelapor</label>
                    <input type="text" x-model="formData.Nama" readonly class="w-full px-4 py-2.5 bg-slate-100 text-slate-500 border border-slate-200 rounded-xl text-sm outline-none">
                </div>
                <div class="col-span-2 space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Lokasi (Where)</label>
                    <input type="text" x-model="formData.where" required placeholder="Contoh: Oven Painting" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500/20 outline-none">
                </div>
                <div class="col-span-2 space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Detail Temuan</label>
                    <textarea x-model="formData.detail" rows="3" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500/20 outline-none"></textarea>
                </div>
                <div class="col-span-2 space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Countermeasure</label>
                    <input type="text" x-model="formData.measure" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none">
                </div>
                <div class="col-span-1 space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Waktu</label>
                    <input type="datetime-local" x-model="formData.When" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none">
                </div>
                <div class="col-span-1 space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Status</label>
                    <select x-model="formData.note" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none">
                        <option value="Belum Close">OPEN</option>
                        <option value="Close">CLOSED</option>
                    </select>
                </div>

                <div class="col-span-2 pt-4">
                    <button type="submit" :disabled="isSyncing" 
                            class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all flex items-center justify-center gap-2">
                        <i x-show="isSyncing" data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>
                        <span x-text="isSyncing ? 'Memproses...' : (isEdit ? 'Update Laporan' : 'Simpan Laporan')"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SPREADSHEET_API = "https://script.google.com/macros/s/AKfycbwlvT2uodaiijE_nNuKXPbasI0gvtSE9vQTDOtRjFshr3RyvW9eIR8B17NVIVwUK5zfiw/exec";

        function nearmissApp() {
            return {
                sidebarOpen: true,
                isMobile: window.innerWidth < 1024,
                isSyncing: false,
                showForm: false,
                isEdit: false,
                searchQuery: '',
                currentFilter: 'all',
                filterLine: 'all',
                nearmiss: [],
                karyawan: [],
                formData: {
                    NIK: '', Nama: '', When: '', originalWhen: '',
                    where: '', detail: '', measure: '', tergetdate: '', note: 'Belum Close'
                },

                async initApp() {
                    lucide.createIcons();
                    this.sidebarOpen = !this.isMobile;
                    await this.loadData();

                    this.$watch('formData.NIK', (value) => {
                        if (!value) { this.formData.Nama = ''; return; }
                        const found = this.karyawan.find(k => k.nik?.toString().trim() === value.toString().trim());
                        this.formData.Nama = found ? found.nama : 'NIK TIDAK DITEMUKAN';
                    });

                    window.addEventListener('resize', () => {
                        this.isMobile = window.innerWidth < 1024;
                        if (!this.isMobile) this.sidebarOpen = true;
                    });
                },

                async loadData() {
                    this.isSyncing = true;
                    try {
                        const r = await fetch(`${SPREADSHEET_API}?t=${Date.now()}`);
                        const d = await r.json();
                        this.nearmiss = (d.nearmiss || []).map(item => ({ ...item, note: item.note || 'Belum Close' }));
                        this.karyawan = d.karyawan || [];
                    } catch (e) {
                        console.error(e);
                    } finally {
                        this.isSyncing = false;
                        setTimeout(() => lucide.createIcons(), 100);
                    }
                },

                formatDate(d) {
                    if (!d) return '-';
                    const date = new Date(d);
                    return isNaN(date) ? d : date.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
                },

                openForm() {
                    this.isEdit = false;
                    const now = new Date();
                    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
                    this.formData = {
                        NIK: '', Nama: '', When: now.toISOString().slice(0, 16),
                        originalWhen: '', where: '', detail: '', measure: '', tergetdate: '', note: 'Belum Close'
                    };
                    this.showForm = true;
                    setTimeout(() => lucide.createIcons(), 50);
                },

                editData(item) {
                    this.isEdit = true;
                    const d = new Date(item.when);
                    const offset = d.getTimezoneOffset() * 60000;
                    const localISOTime = new Date(d - offset).toISOString().slice(0, 16);

                    this.formData = {
                        NIK: item.nik, Nama: item.nama, When: localISOTime,
                        originalWhen: item.when, where: item.where, detail: item.detail,
                        measure: item.measure, tergetdate: item.tergetdate, note: item.note || 'Belum Close'
                    };
                    this.showForm = true;
                    setTimeout(() => lucide.createIcons(), 50);
                },

                async submitForm() {
                    if (!this.formData.Nama || this.formData.Nama === 'NIK TIDAK DITEMUKAN') return alert("NIK tidak valid!");
                    this.isSyncing = true;
                    const payload = { 
                        action: this.isEdit ? 'updateNearmiss' : 'addNearmiss',
                        data: { ...this.formData },
                        nik: this.formData.NIK,
                        when: this.formData.originalWhen 
                    };
                    try {
                        const r = await fetch(SPREADSHEET_API, { method: 'POST', body: JSON.stringify(payload) });
                        const res = await r.json();
                        if (res.status === 'success') {
                            this.showForm = false;
                            await this.loadData();
                        }
                    } catch (e) {
                        alert("Gagal memproses data.");
                    } finally { this.isSyncing = false; }
                },

                async deleteData(nik, when) {
                    if (!confirm("Hapus laporan ini?")) return;
                    this.isSyncing = true;
                    try {
                        const r = await fetch(SPREADSHEET_API, { method: 'POST', body: JSON.stringify({ action: 'deleteNearmiss', nik, when }) });
                        const res = await r.json();
                        if (res.status === 'success') await this.loadData();
                    } catch (e) { alert("Gagal hapus data."); }
                    finally { this.isSyncing = false; }
                },

                get uniqueLines() {
                    const lines = this.karyawan.map(k => k.line || k.Line).filter(l => l && l !== '-');
                    return [...new Set(lines)].sort();
                },

                get filteredNearmiss() {
                    return this.nearmiss.filter(n => {
                        const kp = this.karyawan.find(k => k.nik?.toString() === n.nik?.toString());
                        const lineK = kp ? (kp.line || kp.Line) : '-';
                        const s = this.searchQuery.toLowerCase();
                        const matchText = (n.nama || '').toLowerCase().includes(s) || (n.nik || '').toString().includes(s) || (n.where || '').toLowerCase().includes(s);
                        const matchStatus = this.currentFilter === 'all' || (n.note === 'Close' ? 'Close' : 'Belum Close') === this.currentFilter;
                        const matchLine = this.filterLine === 'all' || lineK === this.filterLine;
                        return matchText && matchStatus && matchLine;
                    });
                },

                logout() {
                    if (confirm("Keluar dari aplikasi?")) {
                        localStorage.clear();
                        window.location.replace("index.html");
                    }
                }
            }
        }
    </script>
</body>
</html>
